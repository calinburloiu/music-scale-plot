<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Scale Plot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="panel editor-panel">
      <h2>Scale Editor</h2>
      <div class="base-note-row">
        <label for="base-note">Base Note</label>
        <select id="base-note">
          <option value="0">A</option>
          <option value="2">B</option>
          <option value="3">C</option>
          <option value="5">D</option>
          <option value="7">E</option>
          <option value="8">F</option>
          <option value="10">G</option>
        </select>
      </div>
      <div id="editor">
        <div class="row note-row" data-degree="1">
          <label>Note 1</label>
          <input type="text" class="note-name" placeholder="name">
          <span class="cumulative-cents"></span>
          <button class="play-note" title="Play note">&#9654;</button>
        </div>
        <div class="row interval-row">
          <input type="text" class="interval-ratio" placeholder="ratio" value="9/8">
          <span class="cents-label"></span>
          <input type="text" class="interval-label" placeholder="label">
        </div>
        <div class="row note-row" data-degree="2">
          <label>Note 2</label>
          <input type="text" class="note-name" placeholder="name">
          <span class="cumulative-cents"></span>
          <button class="play-note" title="Play note">&#9654;</button>
        </div>
      </div>
      <div class="editor-controls">
        <button id="add-note">Add note</button>
        <button id="remove-note">Remove last note</button>
      </div>
    </div>
    <div class="panel chart-panel">
      <div class="chart-toolbar">
        <label for="zoom">Zoom</label>
        <input type="range" id="zoom" min="10" max="100" value="100" step="5">
        <span id="zoom-value">100%</span>
        <button id="save-png">Save as PNG</button>
      </div>
      <canvas id="chart"></canvas>
    </div>
  </div>
  <script src="app.js" defer></script>
</body>
</html>
